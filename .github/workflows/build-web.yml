# Build the public web app at web/_site/ and deploy it to GitHub Pages
# on every push to main. The web app renders example/example.typ through
# every public style and ships three viewer pages (scroll / side-by-side
# / grid) plus a WASM editor that runs typst.ts in-browser.

name: build-web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: typst-community/setup-typst@v4
        with:
          typst-version: latest

      - name: Install uv (for the font fetch script)
        uses: astral-sh/setup-uv@v6

      - name: Fetch optional fonts
        run: ./assets/fonts/fetch.sh

      - name: Build web/_site/
        run: ./web/build.sh

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/_site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
